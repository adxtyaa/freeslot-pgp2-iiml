<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreeSlot — IIM Lucknow Term IV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d14;
  --card:#1a1a26;
  --card2:#22223a;
  --border:#2a2a3e;
  --green:#22c55e;
  --red:#ef4444;
  --yellow:#f59e0b;
  --brand:#7c3aed;
  --brand-l:#a78bfa;
  --text:#f0f0f8;
  --muted:#888899;
  --muted-l:#aaaabc;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:16px;
  line-height:1.5;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
}

.app{
  max-width:480px;
  margin:0 auto;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  padding:0 16px;
}

/* ── Header ── */
.hdr{
  padding:18px 0 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  flex-shrink:0;
}
.hdr-logo h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px;line-height:1}
.hdr-logo h1 span{color:var(--brand-l)}
.hdr-logo p{font-size:.68rem;color:var(--muted);margin-top:2px}
.hdr-acts{display:flex;gap:6px}
.btn-ghost{
  background:var(--card);border:1px solid var(--border);color:var(--muted-l);
  font-size:.72rem;font-weight:600;padding:0 10px;border-radius:8px;cursor:pointer;
  font-family:inherit;min-height:34px;white-space:nowrap;transition:all .15s;
}
.btn-ghost:hover{background:var(--card2);color:var(--text);border-color:var(--brand-l)}

/* ── Main ── */
.main{flex:1;padding-bottom:24px}

/* ── Screens ── */
.screen{display:none}
.screen.active{display:block;animation:fadeUp .25s ease}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Step header ── */
.step-hdr{padding:22px 0 18px}
.step-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brand-l);margin-bottom:6px}
.step-title{font-size:1.55rem;font-weight:700;letter-spacing:-.5px;line-height:1.2}
.step-sub{font-size:.85rem;color:var(--muted);margin-top:6px}

/* ── Autocomplete ── */
.ac-wrap{position:relative;margin-bottom:12px}
.search-input{
  width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  color:var(--text);font-family:inherit;font-size:1rem;padding:14px 16px;outline:none;
  transition:border-color .15s;min-height:50px;
}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--brand-l)}

.dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);
  border:1.5px solid var(--border);border-radius:12px;z-index:200;
  box-shadow:0 8px 32px rgba(0,0,0,.55);max-height:300px;overflow-y:auto;display:none;
}
.dropdown.open{display:block}
.dd-item{
  padding:11px 16px;cursor:pointer;transition:background .1s;
  min-height:54px;display:flex;flex-direction:column;justify-content:center;gap:2px;
}
.dd-item:hover,.dd-item.focused{background:var(--card2)}
.dd-name{font-size:.88rem;font-weight:600}
.dd-roll{font-size:.73rem;color:var(--muted)}
.dd-empty{padding:16px;color:var(--muted);font-size:.85rem;text-align:center}

/* ── Selection chip ── */
.sel-chip{
  display:inline-flex;align-items:center;gap:8px;background:#1e1b4b;
  border:1px solid var(--brand);border-radius:999px;padding:8px 14px 8px 10px;
  font-size:.85rem;margin-bottom:20px;flex-wrap:wrap;
}
.sel-dot{width:8px;height:8px;background:var(--brand-l);border-radius:50%;flex-shrink:0}
.sel-name{font-weight:700;color:var(--text)}
.sel-roll{color:var(--muted);font-size:.73rem}

/* ── Primary button ── */
.btn-primary{
  display:block;width:100%;background:var(--brand);color:#fff;border:none;border-radius:12px;
  font-family:inherit;font-size:1rem;font-weight:700;padding:16px;cursor:pointer;
  transition:background .15s,opacity .15s,transform .1s;min-height:52px;letter-spacing:-.2px;
}
.btn-primary:hover:not(:disabled){background:#6d28d9}
.btn-primary:active:not(:disabled){transform:scale(.98)}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}

/* ── Friends list (step 2) ── */
.friends-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:300px;overflow-y:auto}
.f-chip{
  display:flex;align-items:center;justify-content:space-between;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:12px 8px 12px 14px;gap:8px;
}
.f-chip-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.f-chip-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.f-chip-roll{color:var(--muted);font-size:.73rem}
.f-chip-rm{
  background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;
  min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;transition:color .15s,background .15s;flex-shrink:0;
}
.f-chip-rm:hover{color:var(--red);background:#2a1010}

.empty-friends{
  text-align:center;color:var(--muted);font-size:.85rem;padding:28px 0;
  border:1.5px dashed var(--border);border-radius:14px;margin-bottom:14px;
}

/* ── Day tabs ── */
.day-tabs{
  display:flex;gap:5px;padding:12px 0 4px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{
  flex-shrink:0;background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;
  padding:0 12px;cursor:pointer;transition:all .15s;min-height:40px;letter-spacing:.02em;
}
.day-tab:hover{color:var(--text);border-color:var(--brand-l)}
.day-tab.is-today{border-color:var(--brand-l);color:var(--brand-l)}
.day-tab.active{background:var(--brand);border-color:var(--brand);color:#fff}

/* Time override */
.time-row{
  display:flex;align-items:center;gap:10px;margin:6px 0 8px;padding:10px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
}
.time-label{font-size:.78rem;color:var(--muted);white-space:nowrap}
.time-input{
  background:transparent;border:none;color:var(--text);font-family:inherit;
  font-size:.95rem;font-weight:700;outline:none;cursor:pointer;flex:1;min-width:0;
}
.btn-sm{
  background:var(--brand);color:#fff;border:none;border-radius:8px;
  font-family:inherit;font-size:.78rem;font-weight:700;padding:0 14px;
  cursor:pointer;min-height:34px;transition:background .15s;
}
.btn-sm:hover{background:#6d28d9}

/* Refresh row */
.refresh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.last-chk{font-size:.72rem;color:var(--muted)}
.btn-refresh{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  color:var(--muted-l);font-family:inherit;font-size:.75rem;font-weight:600;
  padding:0 12px;cursor:pointer;min-height:34px;transition:all .15s;
}
.btn-refresh:hover{color:var(--text);border-color:var(--brand-l)}

/* ── User status card ── */
.status-card{
  background:var(--card);border-radius:16px;padding:18px 20px;margin-bottom:10px;
  border:1.5px solid var(--border);position:relative;overflow:hidden;
}
.status-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.status-card.free::before{background:var(--green)}
.status-card.busy::before{background:var(--red)}
.status-card.done::before{background:var(--muted)}

.s-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.status-card.free .s-label{color:var(--green)}
.status-card.busy .s-label{color:var(--red)}
.status-card.done .s-label{color:var(--muted)}

.s-big{font-size:2.2rem;font-weight:800;letter-spacing:-1px;line-height:1;margin-bottom:5px}
.status-card.free .s-big{color:var(--text)}
.status-card.busy .s-big{color:var(--red)}
.status-card.done .s-big{color:var(--muted)}

.s-sub{font-size:.83rem;color:var(--muted)}
.s-sub strong{color:var(--muted-l);font-weight:600}
.window-meta{font-size:.76rem;color:var(--muted);margin:-2px 0 10px}
.course-ref{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap}
.course-code{color:var(--muted-l);font-weight:700}
.phase-badge{
  display:inline-flex;align-items:center;border-radius:999px;padding:1px 6px;
  font-size:.62rem;font-weight:800;letter-spacing:.02em;line-height:1.45;
  border:1px solid var(--border);background:#141420;color:var(--muted-l);
  vertical-align:middle;white-space:nowrap;
}
.phase-badge.pre{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.12);color:#86efac}
.phase-badge.post{border-color:rgba(167,139,250,.5);background:rgba(124,58,237,.16);color:#c4b5fd}
.phase-badge.full{border-color:rgba(245,158,11,.42);background:rgba(245,158,11,.12);color:#fcd34d}
.phase-badge.unknown{border-color:var(--border);background:#11111b;color:var(--muted)}

/* Section label */
.sec-title{font-size:.68rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}

/* ── Friend result cards ── */
.fr-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:11px;
}
.fr-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.fr-dot.g{background:var(--green);box-shadow:0 0 7px var(--green)}
.fr-dot.r{background:var(--red)}
.fr-dot.y{background:var(--yellow)}

.fr-info{flex:1;min-width:0}
.fr-name{font-weight:700;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fr-status{font-size:.8rem;color:var(--muted);margin-top:3px;line-height:1.4}
.fr-status strong{color:var(--muted-l);font-weight:600}

.fr-badge{flex-shrink:0;text-align:right}
.badge-dur{font-size:.88rem;font-weight:700;color:var(--green)}
.badge-dur.y{color:var(--yellow)}
.badge-dur.r{color:var(--red)}
.badge-sub{font-size:.68rem;color:var(--muted);margin-top:2px}

/* ── Group hangouts ── */
.hangout-panel{
  background:var(--card);border:1.5px solid var(--border);border-radius:16px;
  padding:12px;margin-bottom:8px;
}
.combo-best{
  border:1.5px solid var(--brand);border-radius:14px;background:#1e1b4b;
  padding:13px 14px;margin-bottom:10px;
}
.combo-best-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px}
.combo-best-label{font-size:.68rem;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--brand-l)}
.combo-best-time{font-size:1rem;font-weight:800;color:#fff;white-space:nowrap}
.combo-best-names{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.combo-best-meta{font-size:.74rem;color:var(--muted-l);margin-top:3px}
.combo-tabs{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  margin:2px -2px 10px;padding:0 2px 2px;-webkit-overflow-scrolling:touch;
}
.combo-tabs::-webkit-scrollbar{display:none}
.combo-tab{
  flex-shrink:0;background:#141420;border:1px solid var(--border);border-radius:999px;
  color:var(--muted-l);font-family:inherit;font-size:.74rem;font-weight:800;
  min-height:34px;padding:0 11px;cursor:pointer;
}
.combo-tab.active{background:var(--brand);border-color:var(--brand);color:#fff}
.combo-list{display:flex;flex-direction:column;gap:7px}
.combo-card{
  background:#151521;border:1px solid var(--border);border-radius:12px;
  padding:10px 12px;display:flex;align-items:center;gap:10px;
}
.combo-info{flex:1;min-width:0}
.combo-names{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.combo-count{font-size:.7rem;color:var(--muted);margin-top:2px}
.combo-dur{font-size:.86rem;font-weight:800;color:var(--brand-l);flex-shrink:0;white-space:nowrap}
.combo-more{
  width:100%;background:#141420;border:1px solid var(--border);color:var(--muted-l);
  border-radius:10px;min-height:38px;font-family:inherit;font-size:.76rem;font-weight:800;
  cursor:pointer;margin-top:8px;
}
.combo-more:hover{color:var(--text);border-color:var(--brand-l)}

/* ── Empty states ── */
.empty-state{
  text-align:center;padding:22px 16px;color:var(--muted);font-size:.85rem;
  background:var(--card);border-radius:14px;border:1.5px dashed var(--border);
}
.empty-icon{font-size:1.6rem;margin-bottom:7px}

/* ── Footer ── */
.footer{padding:18px 0 22px;border-top:1px solid var(--border);text-align:center;margin-top:auto}
.footer p{font-size:.7rem;color:var(--muted)}
.footer a{color:var(--brand-l);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="hdr-logo">
      <h1>Free<span>Slot</span></h1>
      <p>Find your free friends &middot; IIM Lucknow Term IV</p>
    </div>
    <div class="hdr-acts" id="hdrActs" style="display:none">
      <button class="btn-ghost" id="btnChgRoll" onclick="goTo(1)">&#8592; Roll</button>
      <button class="btn-ghost" id="btnEditGrp" onclick="goTo(2)">Edit Group</button>
    </div>
  </header>

  <main class="main">

    <!-- SCREEN 1 -->
    <div class="screen active" id="s1">
      <div class="step-hdr">
        <div class="step-label">Step 1 of 3</div>
        <div class="step-title">Who are you?</div>
        <div class="step-sub">Enter your roll number or name.</div>
      </div>
      <div class="ac-wrap">
        <input class="search-input" id="inp1" type="text"
          placeholder="e.g. PGP41342 or Vishal"
          autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="dropdown" id="dd1"></div>
      </div>
      <div id="selfChip"></div>
      <button class="btn-primary" id="btnCont" disabled onclick="goTo(2)">Continue &#8594;</button>
    </div>

    <!-- SCREEN 2 -->
    <div class="screen" id="s2">
      <div class="step-hdr">
        <div class="step-label">Step 2 of 3</div>
        <div class="step-title">Add your friends</div>
        <div class="step-sub">Search by name or roll number. Add at least one.</div>
      </div>
      <div class="ac-wrap">
        <input class="search-input" id="inp2" type="text"
          placeholder="Search friends..."
          autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="dropdown" id="dd2"></div>
      </div>
      <div id="fList"></div>
      <button class="btn-primary" id="btnFind" disabled onclick="goTo(3)">Find Free Time &#8594;</button>
    </div>

    <!-- SCREEN 3 -->
    <div class="screen" id="s3">
      <div class="day-tabs" id="dayTabs"></div>
      <div class="time-row" id="timeRow" style="display:none">
        <span class="time-label">Check at:</span>
        <input type="time" class="time-input" id="timeInp" value="10:00">
        <button class="btn-sm" onclick="runResults()">Go</button>
      </div>
      <div class="refresh-row">
        <span class="last-chk" id="lastChk"></span>
        <button class="btn-refresh" onclick="runResults()">&#8635; Refresh window</button>
      </div>
      <div id="myStatus"></div>
      <div class="sec-title">Your Friends</div>
      <div id="frResults"></div>
      <div class="sec-title">Who can hang out?</div>
      <div id="combosWrap"></div>
      <div style="height:8px"></div>
    </div>

  </main>

  <footer class="footer">
    <p>Data from <a href="https://chandramouli99.github.io/Term-4-Weekly-Timetable-PGP2-IIML/" target="_blank" rel="noopener">Chandramouli's Term IV Timetable</a></p>
    <p>Built with Codex.</p>
  </footer>
</div>

const SLOTS = {
  A:{start:'08:45',end:'10:15'},
  B:{start:'10:30',end:'12:00'},
  C:{start:'12:15',end:'13:45'},
  D:{start:'14:30',end:'16:00'},
  E:{start:'16:15',end:'17:45'},
  F:{start:'18:00',end:'19:30'},
  G:{start:'19:45',end:'21:15'}
};
const SLOT_MINS = {};
for (const [k,v] of Object.entries(SLOTS)) {
  SLOT_MINS[k] = {start:toMins(v.start), end:toMins(v.end), startStr:v.start, endStr:v.end};
}
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const EOD = toMins('21:15');
const COURSE_PHASES = {
  // Add verified mappings here as they become available.
  // Values: 'pre', 'post', or 'full'.
  // Example: BDC:'pre', APPM:'post'
};
const PHASE_LABEL = {
  pre:'Pre-mid',
  post:'Post-mid',
  full:'All term',
  unknown:'Phase not set'
};

// ── STATE ──
let myRoll = null;
let groupRolls = [];
let selDay = 'now';

// ── UTILS ──
function toMins(s) {
  const [h,m] = s.split(':').map(Number);
  return h*60+m;
}
function fromMins(m) {
  return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
}
function fmtDur(m) {
  if (m<=0) return '0 min';
  const h=Math.floor(m/60), r=m%60;
  if (!h) return r+' min';
  if (!r) return h+' hr';
  return h+' hr '+r+' min';
}
function titleCase(s) {
  return s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function mk(tag,cls) {
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  return e;
}
function coursePhase(code) {
  return COURSE_PHASES[code] || 'unknown';
}
function courseHtml(code) {
  if(!code) return '';
  const phase=coursePhase(code);
  return `<span class="course-ref"><strong class="course-code">${esc(code)}</strong><span class="phase-badge ${phase}">${esc(PHASE_LABEL[phase])}</span></span>`;
}
function windowLabel(ctx) {
  if(ctx.isSunday) return 'Sunday';
  if(ctx.mode==='now') return `${DAY_SHORT[ctx.dayNum]} ${fromMins(ctx.nowMins)}`;
  return `${DAY_SHORT[ctx.dayNum]} ${fromMins(ctx.nowMins)} planned`;
}

// ── DATA HELPERS ──
const _cache = {};
function getStudent(roll) {
  if (_cache[roll]) return _cache[roll];
  try {
    const raw = DATA[roll];
    if (!raw) return null;
    const pi = raw.indexOf('|');
    if (pi<0) return null;
    const name = raw.substring(0,pi);
    const classStr = raw.substring(pi+1);
    const classes = classStr ? classStr.split(',').map(c => {
      const day=parseInt(c[0]);
      const slot=c[1];
      const code=c.substring(3);
      const sm=SLOT_MINS[slot];
      if (!sm||isNaN(day)||day<1||day>6) return null;
      return {day,slot,code,start:sm.start,end:sm.end,startStr:sm.startStr,endStr:sm.endStr};
    }).filter(Boolean) : [];
    _cache[roll]={roll,name,classes};
    return _cache[roll];
  } catch(e) { return null; }
}

function dayClasses(roll,dayNum) {
  const s=getStudent(roll);
  if(!s) return [];
  return s.classes.filter(c=>c.day===dayNum).sort((a,b)=>a.start-b.start);
}

function freeWindow(roll,dayNum,nowMins) {
  const cls=dayClasses(roll,dayNum);
  for (const c of cls) {
    if (nowMins>=c.start && nowMins<c.end)
      return {busy:true,code:c.code,until:c.end,untilStr:c.endStr};
  }
  const next=cls.find(c=>c.start>nowMins);
  if (next) return {busy:false,until:next.start,untilStr:next.startStr,nextCode:next.code};
  return {busy:false,until:EOD,untilStr:'21:15',nextCode:null};
}

function sharedMins(userW,friendW,nowMins) {
  if (userW.busy) return 0;
  if (friendW.busy)
    return friendW.until<userW.until ? userW.until-friendW.until : 0;
  return Math.max(0, Math.min(userW.until,friendW.until)-nowMins);
}

// ── SEARCH INDEX ──
const INDEX = [];
for (const [roll,val] of Object.entries(DATA)) {
  try {
    const pi=val.indexOf('|');
    if(pi<0) continue;
    const name=val.substring(0,pi);
    INDEX.push({roll,name,nameLo:name.toLowerCase(),rollLo:roll.toLowerCase()});
  } catch(e) {}
}
INDEX.sort((a,b)=>a.name.localeCompare(b.name));

function search(q,exclude) {
  const ql=q.toLowerCase().trim();
  if(!ql) return [];
  const ex=new Set(exclude);
  const out=[];
  for (const s of INDEX) {
    if(ex.has(s.roll)) continue;
    if(s.nameLo.includes(ql)||s.rollLo.includes(ql)) {
      out.push(s);
      if(out.length>=8) break;
    }
  }
  return out;
}

// ── LOCALSTORAGE ──
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}

// ── AUTOCOMPLETE ──
function mkAC(inpId,ddId,excludeFn,onSelect) {
  const inp=document.getElementById(inpId);
  const dd=document.getElementById(ddId);
  let focused=-1, results=[], timer;

  inp.addEventListener('input',()=>{
    clearTimeout(timer);
    timer=setTimeout(()=>{results=search(inp.value,excludeFn());focused=-1;render();},150);
  });

  inp.addEventListener('keydown',e=>{
    if(!dd.classList.contains('open')) return;
    if(e.key==='ArrowDown'){e.preventDefault();focused=Math.min(focused+1,results.length-1);render();}
    else if(e.key==='ArrowUp'){e.preventDefault();focused=Math.max(focused-1,-1);render();}
    else if(e.key==='Enter'){e.preventDefault();if(results[focused])pick(results[focused]);}
    else if(e.key==='Escape')close();
  });

  document.addEventListener('pointerdown',e=>{
    if(!inp.contains(e.target)&&!dd.contains(e.target))close();
  });

  function render(){
    dd.innerHTML='';
    if(!results.length){
      if(inp.value.trim()){
        const d=mk('div','dd-empty');d.textContent='No matches found';
        dd.appendChild(d);dd.classList.add('open');
      } else close();
      return;
    }
    dd.classList.add('open');
    results.forEach((s,i)=>{
      const item=mk('div','dd-item'+(i===focused?' focused':''));
      const nm=mk('div','dd-name');nm.textContent=titleCase(s.name);
      const rl=mk('div','dd-roll');rl.textContent=s.roll;
      item.appendChild(nm);item.appendChild(rl);
      item.addEventListener('pointerdown',ev=>{ev.preventDefault();pick(s);});
      dd.appendChild(item);
    });
  }

  function pick(s){inp.value='';close();onSelect(s);}
  function close(){dd.classList.remove('open');focused=-1;results=[];}
}

// ── NAVIGATION ──
function goTo(n) {
  [1,2,3].forEach(i=>document.getElementById('s'+i).classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  const ha=document.getElementById('hdrActs');
  if(n===1){
    ha.style.display='none';
  } else if(n===2){
    ha.style.display='flex';
    document.getElementById('btnEditGrp').style.display='none';
    document.getElementById('btnChgRoll').style.display='';
    renderFList();
    setTimeout(()=>document.getElementById('inp2').focus(),300);
  } else {
    ha.style.display='flex';
    document.getElementById('btnEditGrp').style.display='';
    document.getElementById('btnChgRoll').style.display='';
    buildTabs();
    runResults();
  }
}

    const chip=document.getElementById('selfChip');
    chip.className='sel-chip';
    chip.innerHTML=`<div class="sel-dot"></div><span class="sel-name">${esc(titleCase(s.name))}</span><span class="sel-roll">${esc(s.roll)}</span>`;
    document.getElementById('btnCont').disabled=false;
    document.getElementById('inp1').value='';
  }
  mkAC('inp1','dd1',()=>[],pickSelf);
  const saved=lsGet('freeslot_myRoll');
  if(saved&&DATA[saved]){const s=getStudent(saved);if(s)pickSelf(s);}
}

// ── STEP 2 ──
function initS2(){
  try{
    const sv=lsGet('freeslot_group');
    if(sv){const arr=JSON.parse(sv);if(Array.isArray(arr))groupRolls=arr.filter(r=>DATA[r]);}
  }catch(e){groupRolls=[];}
  mkAC('inp2','dd2',()=>[myRoll,...groupRolls],s=>{
    if(!groupRolls.includes(s.roll)){
      groupRolls.push(s.roll);
      lsSet('freeslot_group',JSON.stringify(groupRolls));
      renderFList();
    }
  });
}

function renderFList(){
  const c=document.getElementById('fList');
  const btn=document.getElementById('btnFind');
  c.innerHTML='';
  if(!groupRolls.length){
    const e=mk('div','empty-friends');
    e.innerHTML='<div style="font-size:1.4rem;margin-bottom:6px">&#128101;</div>No friends added yet';
    c.appendChild(e);btn.disabled=true;return;
  }
  const list=mk('div','friends-list');
  groupRolls.forEach(roll=>{
    const s=getStudent(roll);
    if(!s) return;
    const chip=mk('div','f-chip');
    const info=mk('div','f-chip-info');
    const nm=mk('div','f-chip-name');nm.textContent=titleCase(s.name);
    const rl=mk('div','f-chip-roll');rl.textContent=s.roll;
    info.appendChild(nm);info.appendChild(rl);
    const rm=mk('button','f-chip-rm');
    rm.textContent='✕';
    rm.setAttribute('aria-label','Remove '+s.name);
    rm.addEventListener('click',()=>{
      groupRolls=groupRolls.filter(r=>r!==roll);
      lsSet('freeslot_group',JSON.stringify(groupRolls));
      renderFList();
    });
    chip.appendChild(info);chip.appendChild(rm);
    list.appendChild(chip);
  });
  c.appendChild(list);
  btn.disabled=false;
}

// ── STEP 3: TABS ──
function buildTabs(){
  const wrap=document.getElementById('dayTabs');
  wrap.innerHTML='';
  const todayJs=new Date().getDay();

  const nowTab=mk('button','day-tab'+(selDay==='now'?' active':''));
  nowTab.textContent='Now';
  nowTab.addEventListener('click',()=>{
    selDay='now';
    document.getElementById('timeRow').style.display='none';
    updTabs();runResults();
  });
  wrap.appendChild(nowTab);

  for(let d=1;d<=6;d++){
    const isToday=d===todayJs;
    const tab=mk('button','day-tab'+(isToday?' is-today':'')+(selDay===d?' active':''));
    tab.textContent=DAY_SHORT[d];
    const dd=d;
    tab.addEventListener('click',()=>{
      selDay=dd;
      document.getElementById('timeRow').style.display='flex';
      updTabs();runResults();
    });
    wrap.appendChild(tab);
  }
}

function updTabs(){
  const tabs=document.getElementById('dayTabs').querySelectorAll('.day-tab');
  tabs.forEach((t,i)=>{
    t.classList.remove('active');
    if(i===0&&selDay==='now') t.classList.add('active');
    else if(i>0&&selDay===i) t.classList.add('active');
  });
}

// ── STEP 3: RESULTS ──
function getCtx(){
  if(selDay==='now'){
    const now=new Date();
    const jsDay=now.getDay();
    return {mode:'now', dayNum:jsDay, nowMins:now.getHours()*60+now.getMinutes(), isSunday:jsDay===0};
  }
  const t=document.getElementById('timeInp').value||'10:00';
  return {mode:'planned', dayNum:selDay, nowMins:toMins(t), isSunday:false};
}

function runResults(){
  const now=new Date();
  const ctx=getCtx();
  document.getElementById('lastChk').textContent=
    `Showing ${windowLabel(ctx)} · refreshed ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  renderMyStatus(ctx);
  renderFrResults(ctx);
}

function renderMyStatus({dayNum,nowMins,isSunday}){
  const wrap=document.getElementById('myStatus');
  wrap.innerHTML='';
  const s=getStudent(myRoll);
  if(!s) return;

  if(isSunday){
    const c=mk('div','status-card done');
    c.innerHTML=`<div class="s-label">Sunday</div><div class="s-big" style="font-size:1.5rem">No classes today &#127881;</div><div class="s-sub">Enjoy your day off!</div>`;
    wrap.appendChild(c);return;
  }

  const w=freeWindow(myRoll,dayNum,nowMins);
  const c=mk('div','status-card '+(w.busy?'busy':'free'));
  const meta=mk('div','window-meta');
  meta.textContent='Window: '+windowLabel({mode:selDay==='now'?'now':'planned',dayNum,nowMins,isSunday});

  if(w.busy){
    const left=w.until-nowMins;
    c.innerHTML=`<div class="s-label">You're in class</div><div class="s-big">${courseHtml(w.code)}</div><div class="s-sub">Until <strong>${esc(w.untilStr)}</strong> &mdash; ${fmtDur(left)} left</div>`;
  } else if(nowMins>=EOD){
    c.className='status-card done';
    c.innerHTML=`<div class="s-label">Done for the day</div><div class="s-big" style="font-size:1.4rem">No more classes</div><div class="s-sub">You're free for the rest of the evening!</div>`;
  } else {
    const freeMins=w.until-nowMins;
    if(w.nextCode){
      c.innerHTML=`<div class="s-label">You're free</div><div class="s-big">${fmtDur(freeMins)}</div><div class="s-sub">Until <strong>${esc(w.untilStr)}</strong> &mdash; ${courseHtml(w.nextCode)}</div>`;
    } else {
      c.innerHTML=`<div class="s-label">You're free</div><div class="s-big">Rest of day</div><div class="s-sub">No more classes ${selDay==='now'?'today':DAY_SHORT[dayNum]}!</div>`;
    }
  }
  wrap.appendChild(meta);
  wrap.appendChild(c);
}

function renderFrResults({dayNum,nowMins,isSunday}){
  const frWrap=document.getElementById('frResults');
  const cWrap=document.getElementById('combosWrap');
  frWrap.innerHTML='';cWrap.innerHTML='';

  if(isSunday){
    frWrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#128197;</div>No classes on Sunday &mdash; everyone\'s off!</div>';
    return;
  }

  const myW=freeWindow(myRoll,dayNum,nowMins);
  const myInClass=myW.busy;

  const rows=[];
  for(const roll of groupRolls){
    const s=getStudent(roll);
    if(!s) continue;
    const fw=freeWindow(roll,dayNum,nowMins);
    const shared=sharedMins(myW,fw,nowMins);
    rows.push({roll,name:s.name,fw,shared});
  }

  if(!rows.length){
    frWrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#128101;</div>No friends in your group!</div>';
    return;
  }

  rows.sort((a,b)=>{
    const af=!a.fw.busy,bf=!b.fw.busy;
    if(af&&!bf) return -1;
    if(!af&&bf) return 1;
    return b.shared-a.shared;
  });

  const freeNow=[];

  for(const {roll,name,fw,shared} of rows){
    const card=mk('div','fr-card');
    const dot=mk('div','fr-dot');
    const info=mk('div','fr-info');
    const nm=mk('div','fr-name');nm.textContent=titleCase(name);
    const st=mk('div','fr-status');
    const badge=mk('div','fr-badge');

    if(!fw.busy){
      dot.classList.add('g');
      if(fw.nextCode){
        st.innerHTML=`Free until <strong>${esc(fw.untilStr)}</strong> &mdash; ${courseHtml(fw.nextCode)}`;
      } else {
        st.textContent='Free rest of the day';
      }
      if(shared>=1){
        const dur=mk('div','badge-dur');dur.textContent=fmtDur(shared);
        const sub=mk('div','badge-sub');sub.textContent='together';
        badge.appendChild(dur);badge.appendChild(sub);
        if(!myInClass) freeNow.push({roll,name,freeUntil:fw.until});
      } else {
        const dur=mk('div','badge-dur r');dur.textContent='no overlap';
        badge.appendChild(dur);
      }
    } else {
      dot.classList.add(shared>0?'y':'r');
      st.innerHTML=`In ${courseHtml(fw.code)} until <strong>${esc(fw.untilStr)}</strong>`;
      if(shared>0){
        const dur=mk('div','badge-dur y');dur.textContent=fmtDur(shared);
        const sub=mk('div','badge-sub');sub.textContent='overlap later';
        badge.appendChild(dur);badge.appendChild(sub);
      } else {
        const dur=mk('div','badge-dur r');dur.textContent='Busy';
        badge.appendChild(dur);
      }
    }

    info.appendChild(nm);info.appendChild(st);
    card.appendChild(dot);card.appendChild(info);card.appendChild(badge);
    frWrap.appendChild(card);
  }

  if(myInClass){
    cWrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#9200;</div>Check back when your class ends!</div>';
    return;
  }
  if(!freeNow.length){
    cWrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#128564;</div>Everyone\'s in class right now.</div>';
    return;
  }

  const myEntry={roll:myRoll,name:getStudent(myRoll).name,freeUntil:myW.until};
  renderCombos([myEntry,...freeNow],nowMins,cWrap);
}

function renderCombos(members,nowMins,wrap){
  const combos=buildHangoutCombos(members,nowMins);
  if(!combos.length){
    wrap.innerHTML='<div class="empty-state"><div class="empty-icon">&#128336;</div>No overlapping free windows of 15+ min right now.</div>';
    return;
  }

  const panel=mk('div','hangout-panel');
  const best=combos[0];
  const bestCard=mk('div','combo-best');
  bestCard.innerHTML=`
    <div class="combo-best-top">
      <div class="combo-best-label">Best hangout</div>
      <div class="combo-best-time">${esc(fmtDur(best.mins))}</div>
    </div>
    <div class="combo-best-names">${esc(comboNames(best))}</div>
    <div class="combo-best-meta">${best.size} people together</div>
  `;
  panel.appendChild(bestCard);

  const availableSizes=[...new Set(combos.map(c=>c.bucket))].sort((a,b)=>{
    if(a==='5+') return 1;
    if(b==='5+') return -1;
    return Number(a)-Number(b);
  });
  const tabs=mk('div','combo-tabs');
  const list=mk('div','combo-list');
  let active='all';
  let expanded=false;

  function addTab(key,label){
    const btn=mk('button','combo-tab');
    btn.type='button';
    btn.dataset.comboFilter=key;
    btn.textContent=label;
    btn.addEventListener('click',()=>{
      active=key;
      expanded=false;
      paint();
    });
    tabs.appendChild(btn);
  }

  addTab('all','Best');
  availableSizes.forEach(size=>{
    const count=combos.filter(c=>c.bucket===size).length;
    addTab(String(size),`${size} (${count})`);
  });

  function paint(){
    tabs.querySelectorAll('.combo-tab').forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.comboFilter===active);
    });
    const filtered=active==='all' ? combos : combos.filter(c=>String(c.bucket)===active);
    const visible=filtered.slice(0,expanded ? 12 : 4);
    list.innerHTML='';
    visible.forEach(combo=>list.appendChild(renderComboCard(combo)));
    if(filtered.length>visible.length){
      const more=mk('button','combo-more');
      more.type='button';
      more.textContent=`Show ${Math.min(8,filtered.length-visible.length)} more`;
      more.addEventListener('click',()=>{
        expanded=true;
        paint();
      });
      list.appendChild(more);
    }
  }

  panel.appendChild(tabs);
  panel.appendChild(list);
  wrap.appendChild(panel);
  paint();
}

function buildHangoutCombos(members,nowMins){
  const user=members[0];
  const friends=members.slice(1).sort((a,b)=>b.freeUntil-a.freeUntil);
  const combos=[];
  const allMembers=[user,...friends];
  const fullMins=Math.min(...allMembers.map(m=>m.freeUntil))-nowMins;

  if(allMembers.length>=2&&fullMins>=15){
    combos.push({grp:allMembers,mins:fullMins,size:allMembers.length,bucket:bucketForSize(allMembers.length),full:true});
  }

  for(let size=2;size<=Math.min(4,allMembers.length);size++){
    const groups=getCombos(friends,size-1)
      .map(friendGroup=>[user,...friendGroup])
      .map(grp=>({grp,mins:Math.min(...grp.map(m=>m.freeUntil))-nowMins,size,bucket:String(size)}))
      .filter(c=>c.mins>=15)
      .sort((a,b)=>b.mins-a.mins);
    combos.push(...groups.slice(0,16));
  }

  if(allMembers.length>=5){
    const strongestLarge=[user,...friends.slice(0,4)];
    const largeMins=Math.min(...strongestLarge.map(m=>m.freeUntil))-nowMins;
    if(largeMins>=15){
      combos.push({grp:strongestLarge,mins:largeMins,size:5,bucket:'5+'});
    }
  }

  const seen=new Set();
  return combos
    .sort((a,b)=>b.size-a.size||b.mins-a.mins)
    .filter(combo=>{
      const key=combo.grp.map(m=>m.roll).sort().join('|');
      if(seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function renderComboCard(combo){
  const card=mk('div','combo-card');
  const info=mk('div','combo-info');
  const names=mk('div','combo-names');
  names.textContent=comboNames(combo);
  const count=mk('div','combo-count');
  count.textContent=combo.full ? 'Everyone free together' : combo.size+' people';
  info.appendChild(names);info.appendChild(count);
  const dur=mk('div','combo-dur');
  dur.textContent=fmtDur(combo.mins);
  card.appendChild(info);
  card.appendChild(dur);
  return card;
}

function comboNames(combo){
  return combo.grp.map((m,i)=>i===0?'You':titleCase(m.name).split(' ')[0]).join(' + ');
}

function bucketForSize(size){
  return size>=5 ? '5+' : String(size);
}

function getCombos(arr,size){
  if(size===0) return [[]];
  if(size===1) return arr.map(x=>[x]);
  if(size>arr.length) return [];
  const out=[];
  for(let i=0;i<=arr.length-size;i++){
    getCombos(arr.slice(i+1),size-1).forEach(rest=>out.push([arr[i],...rest]));
  }
  return out;
}

// ── BOOT ──
function boot(){
  initS1();
  initS2();
  const timeInp=document.getElementById('timeInp');
  if(timeInp){
    timeInp.addEventListener('change',()=>{ if(selDay!=='now') runResults(); });
    timeInp.addEventListener('input',()=>{ if(selDay!=='now') runResults(); });
  }
  const savedRoll=lsGet('freeslot_myRoll');
  if(savedRoll&&DATA[savedRoll]){
    myRoll=savedRoll;
    try{
      const sg=lsGet('freeslot_group');
      if(sg){
        const arr=JSON.parse(sg);
        if(Array.isArray(arr)&&arr.length){
          groupRolls=arr.filter(r=>DATA[r]);
          if(groupRolls.length){goTo(3);return;}
        }
      }
    }catch(e){}
    goTo(2);
  } else {
    goTo(1);
  }
}

boot();
</script>
